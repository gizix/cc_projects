{% extends "base.html" %}
{% block title %}— Logs{% endblock %}
{% block content %}
<div class="space-y-4">
  <h2 class="text-lg font-bold text-gray-100">Task Run Log</h2>

  <div id="log-panel"
       hx-get="/api/logs"
       hx-trigger="load, every 3s"
       hx-swap="innerHTML"
       class="bg-gray-900 rounded-lg border border-gray-800 p-4 h-[calc(100vh-10rem)] overflow-y-auto font-mono text-xs text-green-400 space-y-0.5">
    <span class="text-gray-600">Loading…</span>
  </div>
</div>

<script>
  document.body.addEventListener('htmx:afterSwap', function(e) {
    if (e.detail.target.id === 'log-panel') {
      try {
        const data = JSON.parse(e.detail.xhr.responseText);
        const el = document.getElementById('log-panel');
        el.innerHTML = data.lines.map(l => `<div>${l}</div>`).join('') || '<div class="text-gray-600">No log entries</div>';
        el.scrollTop = el.scrollHeight;
      } catch(_) {}
    }
  });
</script>
{% endblock %}
