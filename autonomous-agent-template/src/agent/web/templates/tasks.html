{% extends "base.html" %}
{% block title %}— Tasks{% endblock %}
{% block content %}
<div class="space-y-4">
  <div class="flex items-center justify-between">
    <h2 class="text-lg font-bold text-gray-100">Scheduled Tasks</h2>
    <a href="/schedule" class="px-3 py-1.5 bg-indigo-700 hover:bg-indigo-600 rounded text-xs text-white">
      + Add Task
    </a>
  </div>

  <div class="bg-gray-900 rounded-lg border border-gray-800 overflow-hidden">
    <table class="w-full text-xs">
      <thead>
        <tr class="border-b border-gray-800 text-gray-500 uppercase">
          <th class="px-4 py-2 text-left">Job ID</th>
          <th class="px-4 py-2 text-left">Name</th>
          <th class="px-4 py-2 text-left">Next Run</th>
          <th class="px-4 py-2 text-left">Actions</th>
        </tr>
      </thead>
      <tbody id="task-list">
        {% for job in jobs %}
        <tr class="border-b border-gray-800 hover:bg-gray-800/50" id="job-{{ job.id }}">
          <td class="px-4 py-2 text-gray-300 font-mono">{{ job.id }}</td>
          <td class="px-4 py-2 text-gray-400">{{ job.name }}</td>
          <td class="px-4 py-2 text-indigo-300">{{ job.next_run or "—" }}</td>
          <td class="px-4 py-2 space-x-2">
            <button
              hx-post="/tasks/{{ job.id }}/run"
              hx-confirm="Run '{{ job.id }}' now?"
              hx-swap="none"
              class="px-2 py-1 bg-green-800 hover:bg-green-700 rounded text-green-200">
              ▶ Run
            </button>
            <button
              hx-post="/tasks/{{ job.id }}/delete"
              hx-confirm="Delete '{{ job.id }}'?"
              hx-target="#job-{{ job.id }}"
              hx-swap="outerHTML"
              class="px-2 py-1 bg-red-900 hover:bg-red-800 rounded text-red-300">
              ✕ Delete
            </button>
          </td>
        </tr>
        {% else %}
        <tr><td colspan="4" class="px-4 py-6 text-center text-gray-600">No scheduled tasks</td></tr>
        {% endfor %}
      </tbody>
    </table>
  </div>
</div>
{% endblock %}
