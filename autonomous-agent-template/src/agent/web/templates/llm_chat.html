{% extends "base.html" %}
{% block title %}— LLM Chat{% endblock %}
{% block content %}
<div class="flex flex-col h-[calc(100vh-6rem)] space-y-3">
  <div class="flex items-center space-x-3">
    <h2 class="text-lg font-bold text-gray-100">LLM Chat</h2>
    <select id="provider-select" class="bg-gray-800 border border-gray-700 rounded px-2 py-1 text-xs text-gray-300">
      {% for p in providers %}
      <option value="{{ p }}">{{ p }}</option>
      {% endfor %}
    </select>
  </div>

  <!-- Chat history -->
  <div id="chat-history" class="flex-1 bg-gray-900 rounded-lg border border-gray-800 p-4 overflow-y-auto space-y-3">
    <p class="text-gray-600 text-xs text-center">Start a conversation…</p>
  </div>

  <!-- Input -->
  <div class="flex space-x-2">
    <input id="chat-input" type="text" placeholder="Type a message…"
           class="flex-1 bg-gray-800 border border-gray-700 rounded-lg px-4 py-2 text-sm text-gray-200 focus:outline-none focus:border-indigo-500"/>
    <button id="send-btn"
            class="px-4 py-2 bg-indigo-700 hover:bg-indigo-600 rounded-lg text-sm text-white">
      Send
    </button>
  </div>
</div>

<script>
const history = document.getElementById('chat-history');
const input = document.getElementById('chat-input');
const sendBtn = document.getElementById('send-btn');

function addMessage(role, text) {
  const div = document.createElement('div');
  div.className = role === 'user'
    ? 'text-right'
    : 'text-left';
  div.innerHTML = `
    <span class="inline-block px-3 py-2 rounded-lg text-xs max-w-[80%] text-left whitespace-pre-wrap
      ${role === 'user' ? 'bg-indigo-800 text-white' : 'bg-gray-800 text-gray-200'}">
      ${text}
    </span>`;
  history.appendChild(div);
  history.scrollTop = history.scrollHeight;
  return div;
}

async function sendMessage() {
  const msg = input.value.trim();
  if (!msg) return;
  input.value = '';
  addMessage('user', msg);

  const assistantDiv = addMessage('assistant', '…');
  const span = assistantDiv.querySelector('span');
  span.textContent = '';

  const response = await fetch('/llm/stream', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({message: msg, system_prompt: 'You are a helpful assistant.'})
  });

  const reader = response.body.getReader();
  const decoder = new TextDecoder();
  let buf = '';

  while (true) {
    const {done, value} = await reader.read();
    if (done) break;
    buf += decoder.decode(value, {stream: true});
    const lines = buf.split('\n');
    buf = lines.pop();
    for (const line of lines) {
      if (!line.startsWith('data: ')) continue;
      const payload = line.slice(6);
      if (payload === '[DONE]') break;
      try {
        const data = JSON.parse(payload);
        if (data.chunk) span.textContent += data.chunk;
        if (data.error) span.textContent = '[Error] ' + data.error;
      } catch(_) {}
    }
    history.scrollTop = history.scrollHeight;
  }
}

sendBtn.addEventListener('click', sendMessage);
input.addEventListener('keydown', e => { if (e.key === 'Enter') sendMessage(); });
</script>
{% endblock %}
